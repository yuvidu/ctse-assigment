spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Longer waits for Stripe + downstream HTTP (default ~30s can surface as 504 + missing CORS on errors).
      httpclient:
        connect-timeout: 10000
        response-timeout: 120s
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:https://user-service-app.mangohill-a3908265.southeastasia.azurecontainerapps.io}
          predicates:
            - Path=/users/**
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:https://booking-service-app.mangohill-a3908265.southeastasia.azurecontainerapps.io}
          predicates:
            - Path=/booking/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:https://payment-service-app.mangohill-a3908265.southeastasia.azurecontainerapps.io}
          predicates:
            - Path=/payments/**
        - id: movie-service
          uri: ${MOVIE_SERVICE_URL:https://movie-service-app.mangohill-a3908265.southeastasia.azurecontainerapps.io}
          predicates:
            - Path=/movies/**
        - id: scheduling-service
          uri: ${SCHEDULING_SERVICE_URL:https://scheduling-service-app.mangohill-a3908265.southeastasia.azurecontainerapps.io}
          predicates:
            - Path=/schedules/**
      globalcors:
        cors-configurations:
          '[/**]':
            # Permissive for demos (Vercel, Netlify, localhost, previews). Tighten for production if needed.
            allowedOriginPatterns:
              - "*"
            allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

server:
  port: 8087

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.http.server.reactive: INFO
    org.springframework.web.reactive: INFO
