spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users/**
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/booking/**
        - id: movie-service
          uri: http://localhost:8083
          predicates:
            - Path=/movies/**
        - id: scheduling-service
          uri: http://localhost:8084
          predicates:
            - Path=/schedules/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            allowedHeaders: "*"

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.http.server.reactive: INFO
    org.springframework.web.reactive: INFO
