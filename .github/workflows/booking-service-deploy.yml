name: Deploy Booking Service to Azure Container Apps

on:
  push:
    branches:
      - yuvidu-deploy-service-backend
    paths:
      - 'Booking-Backend/booking-service/**'
      - '.github/workflows/booking-service-deploy.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: bookingacrsliitproject.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          cd Booking-Backend/booking-service

          # Build image using Git SHA
          docker build -t bookingacrsliitproject.azurecr.io/booking-service:${{ github.sha }} .

          # Tag image as 'latest' for Container App auto-pull
          docker tag bookingacrsliitproject.azurecr.io/booking-service:${{ github.sha }} bookingacrsliitproject.azurecr.io/booking-service:latest

          # Push both SHA version and latest
          docker push bookingacrsliitproject.azurecr.io/booking-service:${{ github.sha }}
          docker push bookingacrsliitproject.azurecr.io/booking-service:latest

      - name: Reminder
        run: |
          echo "Push complete. The Container App will pull the latest image if auto-pull is enabled."
          echo "If not, manually redeploy the revision in the Azure Portal."